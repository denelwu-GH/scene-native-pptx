<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.58" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <radialGradient id="hub-gradient" cx="35%" cy="28%" r="75%">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#172554"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7"/>
      <feOffset dx="0" dy="5" result="off"/>
      <feFlood flood-color="#0F3F78" flood-opacity="0.15"/>
      <feComposite in2="off" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="background" data-role="background">
    <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>
  </g>

  <g id="header" data-role="title-area">
    <text id="shape-title" data-text-id="title" x="62" y="66" font-family="Arial" font-size="38" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">Media-Rich Service Journey</text>
    <text id="shape-subtitle" data-text-id="subtitle" x="62" y="101" font-family="Arial" font-size="18" font-weight="500" fill="#475569" text-anchor="start" letter-spacing="0">Native layout with isolated, replaceable artwork</text>
    <rect x="1360" y="46" width="178" height="38" rx="19" fill="#CCFBF1" stroke="#5EEAD4" stroke-width="1"/>
    <text id="shape-status" data-text-id="status" x="1449" y="71" font-family="Arial" font-size="13" font-weight="700" fill="#0F766E" text-anchor="middle" letter-spacing="0">HYBRID MODE</text>
  </g>

  <g id="journey" data-role="service-stages">
    <rect x="62" y="170" width="344" height="258" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2" filter="url(#shadow)"/>
    <image id="art-0" href="assets/map.png" x="152" y="194" width="164" height="164"/>
    <text id="shape-stage-title-0" data-text-id="stage-title-0" x="234" y="380" font-family="Arial" font-size="22" font-weight="700" fill="#0F172A" text-anchor="middle" letter-spacing="0">Discover</text>
    <text id="shape-stage-desc-0" data-text-id="stage-desc-0" x="234" y="406" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="middle" letter-spacing="0">Understand the request</text>
    <line x1="406" y1="298" x2="440" y2="298" stroke="#38BDF8" stroke-width="5" stroke-linecap="round"/>
    <polygon points="432,288 444,298 432,308" fill="#38BDF8"/>
    <rect x="440" y="170" width="344" height="258" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2" filter="url(#shadow)"/>
    <image id="art-1" href="assets/media.png" x="530" y="194" width="164" height="164"/>
    <text id="shape-stage-title-1" data-text-id="stage-title-1" x="612" y="380" font-family="Arial" font-size="22" font-weight="700" fill="#0F172A" text-anchor="middle" letter-spacing="0">Compose</text>
    <text id="shape-stage-desc-1" data-text-id="stage-desc-1" x="612" y="406" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="middle" letter-spacing="0">Assemble the response</text>
    <line x1="784" y1="298" x2="818" y2="298" stroke="#38BDF8" stroke-width="5" stroke-linecap="round"/>
    <polygon points="810,288 822,298 810,308" fill="#38BDF8"/>
    <rect x="818" y="170" width="344" height="258" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2" filter="url(#shadow)"/>
    <image id="art-2" href="assets/shield.png" x="908" y="194" width="164" height="164"/>
    <text id="shape-stage-title-2" data-text-id="stage-title-2" x="990" y="380" font-family="Arial" font-size="22" font-weight="700" fill="#0F172A" text-anchor="middle" letter-spacing="0">Protect</text>
    <text id="shape-stage-desc-2" data-text-id="stage-desc-2" x="990" y="406" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="middle" letter-spacing="0">Apply policy checks</text>
    <line x1="1162" y1="298" x2="1196" y2="298" stroke="#38BDF8" stroke-width="5" stroke-linecap="round"/>
    <polygon points="1188,288 1200,298 1188,308" fill="#38BDF8"/>
    <rect x="1196" y="170" width="344" height="258" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2" filter="url(#shadow)"/>
    <image id="art-3" href="assets/chart.png" x="1286" y="194" width="164" height="164"/>
    <text id="shape-stage-title-3" data-text-id="stage-title-3" x="1368" y="380" font-family="Arial" font-size="22" font-weight="700" fill="#0F172A" text-anchor="middle" letter-spacing="0">Measure</text>
    <text id="shape-stage-desc-3" data-text-id="stage-desc-3" x="1368" y="406" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="middle" letter-spacing="0">Capture the outcome</text>
  </g>

  <g id="explanation" data-role="hybrid-policy">
    <rect x="62" y="476" width="1476" height="252" rx="16" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.4" filter="url(#shadow)"/>
    <rect x="62" y="476" width="12" height="252" rx="6" fill="url(#accent)"/>
    <text id="shape-panel-title" data-text-id="panel-title" x="104" y="523" font-family="Arial" font-size="26" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">The semantic layout stays editable</text>
    <text id="shape-panel-body" data-text-id="panel-body" x="104" y="558" font-family="Arial" font-size="16" font-weight="500" fill="#475569" text-anchor="start" letter-spacing="0">Artwork is isolated into four local image objects; titles, cards, arrows, metrics, and callouts remain native PowerPoint content.</text>
    <rect x="104" y="606" width="372" height="88" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text id="shape-metric-value-0" data-text-id="metric-value-0" x="128" y="646" font-family="Arial" font-size="26" font-weight="700" fill="#2563EB" text-anchor="start" letter-spacing="0">4</text>
    <text id="shape-metric-label-0" data-text-id="metric-label-0" x="228" y="646" font-family="Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start" letter-spacing="0">replaceable assets</text>
    <rect x="524" y="606" width="372" height="88" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text id="shape-metric-value-1" data-text-id="metric-value-1" x="548" y="646" font-family="Arial" font-size="26" font-weight="700" fill="#2563EB" text-anchor="start" letter-spacing="0">100%</text>
    <text id="shape-metric-label-1" data-text-id="metric-label-1" x="648" y="646" font-family="Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start" letter-spacing="0">editable text</text>
    <rect x="944" y="606" width="372" height="88" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text id="shape-metric-value-2" data-text-id="metric-value-2" x="968" y="646" font-family="Arial" font-size="26" font-weight="700" fill="#0F766E" text-anchor="start" letter-spacing="0">0</text>
    <text id="shape-metric-label-2" data-text-id="metric-label-2" x="1068" y="646" font-family="Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start" letter-spacing="0">remote URLs</text>
  </g>

  <g id="footer" data-role="takeaway">
    <rect x="62" y="770" width="1476" height="80" rx="12" fill="#0F172A"/>
    <text id="shape-footer-title" data-text-id="footer-title" x="104" y="807" font-family="Arial" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="start" letter-spacing="0">Hybrid fidelity rule</text>
    <text id="shape-footer-body" data-text-id="footer-body" x="310" y="807" font-family="Arial" font-size="16" font-weight="500" fill="#CBD5E1" text-anchor="start" letter-spacing="0">Rasterize only the artwork that cannot be represented safely in DrawingML.</text>
  </g>
</svg>
