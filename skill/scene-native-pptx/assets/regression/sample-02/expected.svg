<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030712"/>
      <stop offset="0.55" stop-color="#071A37"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14284B"/>
      <stop offset="1" stop-color="#091426"/>
    </linearGradient>
    <linearGradient id="electric" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#20D9FF"/>
      <stop offset="0.58" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="core-gradient" cx="35%" cy="28%" r="78%">
      <stop offset="0" stop-color="#7DEBFF"/>
      <stop offset="0.45" stop-color="#147BFF"/>
      <stop offset="1" stop-color="#0A1C55"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feFlood flood-color="#01040D" flood-opacity="0.65"/>
      <feComposite in2="off" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="background" data-role="background">
    <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>
    <circle cx="292" cy="414" r="350" fill="none" stroke="#163C69" stroke-width="1" stroke-dasharray="6 16" opacity="0.7"/>
    <line x1="64" y1="686" x2="1536" y2="686" stroke="#16365E" stroke-width="1"/>
  </g>

  <g id="header" data-role="title-area">
    <text id="shape-title" data-text-id="title" x="64" y="78" font-family="Arial" font-size="42" font-weight="700" fill="#F7FBFF" text-anchor="start" letter-spacing="0">Hybrid Intelligence Studio</text>
    <text id="shape-subtitle" data-text-id="subtitle" x="64" y="112" font-family="Arial" font-size="18" font-weight="500" fill="#94A9C8" text-anchor="start" letter-spacing="0">Native structure with one isolated, replaceable visual asset.</text>
    <rect x="1290" y="46" width="246" height="42" rx="21" fill="#13243F" stroke="#8B5CF6" stroke-width="1"/>
    <circle cx="1314" cy="67" r="6" fill="#C084FC"/>
    <text id="shape-status" data-text-id="status" x="1412" y="73" font-family="Arial" font-size="14" font-weight="700" fill="#EEE3FF" text-anchor="middle" letter-spacing="0">HYBRID FIDELITY</text>
  </g>

  <g id="artwork" data-role="isolated-artwork">
    <rect x="64" y="184" width="706" height="420" rx="22" fill="#051226" stroke="#2A5B91" stroke-width="1.4" filter="url(#shadow)"/>
    <rect x="82" y="202" width="670" height="340" rx="16" fill="#020814" stroke="#245B9B" stroke-width="1"/>
    <image id="orchestration-artwork" href="assets/orchestration-artwork.png" x="82" y="202" width="670" height="340"/>
    <rect x="104" y="558" width="164" height="28" rx="14" fill="#102F57" stroke="#2ED9FF" stroke-width="1"/>
    <circle cx="122" cy="572" r="5" fill="#34D399"/>
    <text id="shape-asset-label" data-text-id="asset-label" x="190" y="577" font-family="Arial" font-size="12" font-weight="700" fill="#D7F4FF" text-anchor="middle" letter-spacing="0">ISOLATED ARTWORK</text>
    <text id="shape-asset-note" data-text-id="asset-note" x="738" y="577" font-family="Arial" font-size="13" font-weight="500" fill="#91A8C8" text-anchor="end" letter-spacing="0">1 local PNG · swap without touching layout</text>
  </g>

  <g id="flow" data-role="hybrid-flow">
    <path d="M846 252 H890 V536 H846" fill="none" stroke="#347CC4" stroke-width="2" stroke-linecap="round"/>
    <rect x="914" y="198" width="622" height="108" rx="16" fill="url(#panel)" stroke="#2A5586" stroke-width="1.2" filter="url(#shadow)"/>
    <rect x="938" y="222" width="56" height="56" rx="14" fill="#0B274A" stroke="#2ED9FF" stroke-width="1.4"/>
    <circle cx="966" cy="250" r="12" fill="none" stroke="#2ED9FF" stroke-width="3"/>
    <line x1="954" y1="250" x2="978" y2="250" stroke="#2ED9FF" stroke-width="2.5" stroke-linecap="round"/>
    <text id="shape-stage-number-0" data-text-id="stage-number-0" x="1024" y="237" font-family="Arial" font-size="13" font-weight="700" fill="#2ED9FF" text-anchor="start" letter-spacing="0">01</text>
    <text id="shape-stage-title-0" data-text-id="stage-title-0" x="1024" y="262" font-family="Arial" font-size="16" font-weight="700" fill="#F7FBFF" text-anchor="start" letter-spacing="0">Frame</text>
    <text id="shape-stage-desc-0" data-text-id="stage-desc-0" x="1164" y="264" font-family="Arial" font-size="15" font-weight="500" fill="#A2B7D5" text-anchor="start" letter-spacing="0">Cards, connectors, text</text>
    <rect x="914" y="330" width="622" height="108" rx="16" fill="url(#panel)" stroke="#2A5586" stroke-width="1.2" filter="url(#shadow)"/>
    <rect x="938" y="354" width="56" height="56" rx="14" fill="#0B274A" stroke="#A78BFA" stroke-width="1.4"/>
    <circle cx="966" cy="382" r="12" fill="none" stroke="#A78BFA" stroke-width="3"/>
    <line x1="954" y1="382" x2="978" y2="382" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
    <text id="shape-stage-number-1" data-text-id="stage-number-1" x="1024" y="369" font-family="Arial" font-size="13" font-weight="700" fill="#A78BFA" text-anchor="start" letter-spacing="0">02</text>
    <text id="shape-stage-title-1" data-text-id="stage-title-1" x="1024" y="394" font-family="Arial" font-size="16" font-weight="700" fill="#F7FBFF" text-anchor="start" letter-spacing="0">Isolate</text>
    <text id="shape-stage-desc-1" data-text-id="stage-desc-1" x="1164" y="396" font-family="Arial" font-size="15" font-weight="500" fill="#A2B7D5" text-anchor="start" letter-spacing="0">Artwork is local and replaceable</text>
    <rect x="914" y="462" width="622" height="108" rx="16" fill="url(#panel)" stroke="#2A5586" stroke-width="1.2" filter="url(#shadow)"/>
    <rect x="938" y="486" width="56" height="56" rx="14" fill="#0B274A" stroke="#7CDBB5" stroke-width="1.4"/>
    <circle cx="966" cy="514" r="12" fill="none" stroke="#7CDBB5" stroke-width="3"/>
    <line x1="954" y1="514" x2="978" y2="514" stroke="#7CDBB5" stroke-width="2.5" stroke-linecap="round"/>
    <text id="shape-stage-number-2" data-text-id="stage-number-2" x="1024" y="501" font-family="Arial" font-size="13" font-weight="700" fill="#7CDBB5" text-anchor="start" letter-spacing="0">03</text>
    <text id="shape-stage-title-2" data-text-id="stage-title-2" x="1024" y="526" font-family="Arial" font-size="16" font-weight="700" fill="#F7FBFF" text-anchor="start" letter-spacing="0">Deliver</text>
    <text id="shape-stage-desc-2" data-text-id="stage-desc-2" x="1164" y="528" font-family="Arial" font-size="15" font-weight="500" fill="#A2B7D5" text-anchor="start" letter-spacing="0">Open, edit, present</text>
  </g>

  <g id="metrics" data-role="hybrid-metrics">
    <rect x="64" y="736" width="1472" height="104" rx="14" fill="#071426" stroke="#234C7B" stroke-width="1.2"/>
    <rect x="64" y="736" width="6" height="104" rx="3" fill="#8B5CF6"/>
    <circle cx="116" cy="788" r="20" fill="#19254B" stroke="#A78BFA" stroke-width="1.2"/>
    <circle cx="116" cy="788" r="6" fill="#C4B5FD"/>
    <text id="shape-metric-value-0" data-text-id="metric-value-0" x="150" y="782" font-family="Arial" font-size="24" font-weight="700" fill="#F7FBFF" text-anchor="start" letter-spacing="0">1</text>
    <text id="shape-metric-label-0" data-text-id="metric-label-0" x="150" y="810" font-family="Arial" font-size="14" font-weight="500" fill="#8EA6C8" text-anchor="start" letter-spacing="0">replaceable artwork</text>
    <circle cx="431" cy="788" r="20" fill="#19254B" stroke="#2ED9FF" stroke-width="1.2"/>
    <circle cx="431" cy="788" r="6" fill="#2ED9FF"/>
    <text id="shape-metric-value-1" data-text-id="metric-value-1" x="465" y="782" font-family="Arial" font-size="24" font-weight="700" fill="#F7FBFF" text-anchor="start" letter-spacing="0">100%</text>
    <text id="shape-metric-label-1" data-text-id="metric-label-1" x="465" y="810" font-family="Arial" font-size="14" font-weight="500" fill="#8EA6C8" text-anchor="start" letter-spacing="0">editable text</text>
    <circle cx="746" cy="788" r="20" fill="#19254B" stroke="#2ED9FF" stroke-width="1.2"/>
    <circle cx="746" cy="788" r="6" fill="#2ED9FF"/>
    <text id="shape-metric-value-2" data-text-id="metric-value-2" x="780" y="782" font-family="Arial" font-size="24" font-weight="700" fill="#F7FBFF" text-anchor="start" letter-spacing="0">0</text>
    <text id="shape-metric-label-2" data-text-id="metric-label-2" x="780" y="810" font-family="Arial" font-size="14" font-weight="500" fill="#8EA6C8" text-anchor="start" letter-spacing="0">full-slide bitmaps</text>
    <line x1="1074" y1="756" x2="1074" y2="820" stroke="#234C7B" stroke-width="1"/>
    <text id="shape-footer-label" data-text-id="footer-label" x="1112" y="777" font-family="Arial" font-size="16" font-weight="700" fill="#C4B5FD" text-anchor="start" letter-spacing="0">KEEP THE ART.</text>
    <text id="shape-footer-emphasis" data-text-id="footer-emphasis" x="1112" y="808" font-family="Arial" font-size="21" font-weight="700" fill="#F7FBFF" text-anchor="start" letter-spacing="0">EDIT EVERYTHING ELSE.</text>
  </g>
</svg>
