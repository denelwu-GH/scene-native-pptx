    <rect x="62" y="738" width="8" height="112" rx="4" fill="#2563EB"/>
    <text id="shape-metric-value-0" data-text-id="metric-value-0" x="90" y="785" font-family="Arial" font-size="28" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">12 ms</text>
    <text id="shape-metric-label-0" data-text-id="metric-label-0" x="90" y="817" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="start" letter-spacing="0">Decision latency</text>
    <rect x="440" y="738" width="344" height="112" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <rect x="440" y="738" width="8" height="112" rx="4" fill="#2563EB"/>
    <text id="shape-metric-value-1" data-text-id="metric-value-1" x="468" y="785" font-family="Arial" font-size="28" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">99.9%</text>
    <text id="shape-metric-label-1" data-text-id="metric-label-1" x="468" y="817" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="start" letter-spacing="0">Trace coverage</text>
    <rect x="818" y="738" width="344" height="112" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <rect x="818" y="738" width="8" height="112" rx="4" fill="#2563EB"/>
    <text id="shape-metric-value-2" data-text-id="metric-value-2" x="846" y="785" font-family="Arial" font-size="28" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">4</text>
    <text id="shape-metric-label-2" data-text-id="metric-label-2" x="846" y="817" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="start" letter-spacing="0">Policy gates</text>
    <rect x="1196" y="738" width="344" height="112" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <rect x="1196" y="738" width="8" height="112" rx="4" fill="#0F766E"/>
    <text id="shape-metric-value-3" data-text-id="metric-value-3" x="1224" y="785" font-family="Arial" font-size="28" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">0</text>
    <text id="shape-metric-label-3" data-text-id="metric-label-3" x="1224" y="817" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="start" letter-spacing="0">Raster layers</text>
  </g>
