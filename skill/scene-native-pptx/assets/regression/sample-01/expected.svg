<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.58" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <radialGradient id="hub-gradient" cx="35%" cy="28%" r="75%">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#172554"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7"/>
      <feOffset dx="0" dy="5" result="off"/>
      <feFlood flood-color="#0F3F78" flood-opacity="0.15"/>
      <feComposite in2="off" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="background" data-role="background">
    <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>
    <circle cx="790" cy="445" r="270" fill="none" stroke="#BFDBFE" stroke-width="1" stroke-dasharray="8 10"/>
    <circle cx="790" cy="445" r="210" fill="none" stroke="#DBEAFE" stroke-width="1"/>
  </g>

  <g id="header" data-role="title-area">
    <text id="shape-title" data-text-id="title" x="62" y="66" font-family="Arial" font-size="38" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">Orchestration Control Plane</text>
    <text id="shape-subtitle" data-text-id="subtitle" x="62" y="101" font-family="Arial" font-size="18" font-weight="500" fill="#475569" text-anchor="start" letter-spacing="0">From trusted signals to coordinated service actions</text>
    <rect x="1372" y="46" width="166" height="38" rx="19" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="1"/>
    <text id="shape-status" data-text-id="status" x="1455" y="71" font-family="Arial" font-size="13" font-weight="700" fill="#0369A1" text-anchor="middle" letter-spacing="0">NATIVE FIRST</text>
  </g>

  <g id="inputs" data-role="input-cards">
    <rect x="62" y="176" width="330" height="132" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.4" filter="url(#shadow)"/>
    <circle cx="112" cy="224" r="27" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
    <text id="shape-input-number-0" data-text-id="input-number-0" x="112" y="230" font-family="Arial" font-size="15" font-weight="700" fill="#2563EB" text-anchor="middle" letter-spacing="0">01</text>
    <text id="shape-input-title-0" data-text-id="input-title-0" x="157" y="224" font-family="Arial" font-size="20" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">Live telemetry</text>
    <text id="shape-input-desc-0" data-text-id="input-desc-0" x="157" y="254" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="start" letter-spacing="0">Health, capacity, context</text>
    <line x1="392" y1="242" x2="566" y2="445" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
    <rect x="62" y="352" width="330" height="132" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.4" filter="url(#shadow)"/>
    <circle cx="112" cy="400" r="27" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
    <text id="shape-input-number-1" data-text-id="input-number-1" x="112" y="406" font-family="Arial" font-size="15" font-weight="700" fill="#2563EB" text-anchor="middle" letter-spacing="0">02</text>
    <text id="shape-input-title-1" data-text-id="input-title-1" x="157" y="400" font-family="Arial" font-size="20" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">User request</text>
    <text id="shape-input-desc-1" data-text-id="input-desc-1" x="157" y="430" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="start" letter-spacing="0">Intent, priority, constraints</text>
    <line x1="392" y1="418" x2="566" y2="445" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
    <rect x="62" y="528" width="330" height="132" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.4" filter="url(#shadow)"/>
    <circle cx="112" cy="576" r="27" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
    <text id="shape-input-number-2" data-text-id="input-number-2" x="112" y="582" font-family="Arial" font-size="15" font-weight="700" fill="#2563EB" text-anchor="middle" letter-spacing="0">03</text>
    <text id="shape-input-title-2" data-text-id="input-title-2" x="157" y="576" font-family="Arial" font-size="20" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">Policy signals</text>
    <text id="shape-input-desc-2" data-text-id="input-desc-2" x="157" y="606" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="start" letter-spacing="0">Consent, risk, availability</text>
    <line x1="392" y1="594" x2="566" y2="445" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  </g>

