    <circle cx="790" cy="445" r="127" fill="none" stroke="#60A5FA" stroke-width="4" stroke-dasharray="14 9"/>
    <circle cx="790" cy="445" r="102" fill="url(#hub-gradient)" stroke="#22D3EE" stroke-width="5" filter="url(#shadow)"/>
    <rect x="748" y="395" width="84" height="72" rx="14" fill="none" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="764" y1="415" x2="816" y2="415" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="764" y1="433" x2="803" y2="433" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <text id="shape-hub-title" data-text-id="hub-title" x="790" y="515" font-family="Arial" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0">POLICY ENGINE</text>
    <text id="shape-hub-desc" data-text-id="hub-desc" x="790" y="541" font-family="Arial" font-size="13" font-weight="500" fill="#DBEAFE" text-anchor="middle" letter-spacing="0">Plan  |  route  |  verify</text>
  </g>

