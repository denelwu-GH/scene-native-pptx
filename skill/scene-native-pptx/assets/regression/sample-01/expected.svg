    <text id="shape-output-desc-0" data-text-id="output-desc-0" x="1270" y="254" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="start" letter-spacing="0">Match the best available capability</text>
    <line x1="1014" y1="445" x2="1168" y2="418" stroke="#22D3EE" stroke-width="4" stroke-linecap="round"/>
    <circle cx="1168" cy="418" r="7" fill="#22D3EE"/>
    <rect x="1176" y="352" width="362" height="132" rx="14" fill="#FFFFFF" stroke="#A5F3FC" stroke-width="1.4" filter="url(#shadow)"/>
    <circle cx="1226" cy="400" r="27" fill="#ECFEFF" stroke="#2DD4BF" stroke-width="1.5"/>
    <path d="M1213 400 L1222 409 L1240 390" fill="none" stroke="#0F766E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text id="shape-output-title-1" data-text-id="output-title-1" x="1270" y="400" font-family="Arial" font-size="20" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">Guard action</text>
    <text id="shape-output-desc-1" data-text-id="output-desc-1" x="1270" y="430" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="start" letter-spacing="0">Apply policy before execution</text>
    <line x1="1014" y1="445" x2="1168" y2="594" stroke="#22D3EE" stroke-width="4" stroke-linecap="round"/>
    <circle cx="1168" cy="594" r="7" fill="#22D3EE"/>
    <rect x="1176" y="528" width="362" height="132" rx="14" fill="#FFFFFF" stroke="#A5F3FC" stroke-width="1.4" filter="url(#shadow)"/>
    <circle cx="1226" cy="576" r="27" fill="#ECFEFF" stroke="#2DD4BF" stroke-width="1.5"/>
    <path d="M1213 576 L1222 585 L1240 566" fill="none" stroke="#0F766E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text id="shape-output-title-2" data-text-id="output-title-2" x="1270" y="576" font-family="Arial" font-size="20" font-weight="700" fill="#0F172A" text-anchor="start" letter-spacing="0">Report state</text>
    <text id="shape-output-desc-2" data-text-id="output-desc-2" x="1270" y="606" font-family="Arial" font-size="14" font-weight="500" fill="#64748B" text-anchor="start" letter-spacing="0">Return outcome and confidence</text>
  </g>

  <g id="metrics" data-role="metric-strip">
