name: validate

on:
  push:
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install Pillow
      - run: python tools/audit_public_tree.py .
      - run: python tools/generate_public_fixtures.py
      - run: python tools/generate_benchmark_chart.py
      - run: python tools/generate_ppt_master_workflow.py
      - name: Run two-sample regression
        run: |
          python skill/scene-native-pptx/scripts/run_regression.py \
            --skill-dir skill/scene-native-pptx \
            --output-dir regression-output
      - name: Run PPT Master workflow regression
        run: |
          python skill/ppt-master/scripts/run_regression.py \
            --skill-dir skill/ppt-master \
            --output-dir /tmp/ppt-master-regression
